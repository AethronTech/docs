<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Klantel</title>
  <desc>Klantel logo — CRM en tijdregistratie voor advocaten en zelfstandigen</desc>

  <!-- Icoon achtergrond -->
  <rect x="5" y="5" width="90" height="90" rx="18" fill="#0C447C"/>

  <!-- Persoon: hoofd -->
  <circle cx="50" cy="32" r="14" fill="white"/>

  <!-- Persoon: schouders / lichaam -->
  <path d="M23,78 Q23,56 50,56 Q77,56 77,78" fill="white"/>

  <!-- Klok-badge: buitenring (dezelfde kleur als achtergrond = geïntegreerd effect) -->
  <circle cx="80" cy="83" r="16" fill="#0C447C"/>
  <!-- Klok: wijzerplaat -->
  <circle cx="80" cy="83" r="13" fill="white"/>
  <!-- Uurwijzer -->
  <line x1="80" y1="83" x2="80" y2="74" stroke="#0C447C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minuutwijzer -->
  <line x1="80" y1="83" x2="86" y2="87" stroke="#0C447C" stroke-width="2" stroke-linecap="round"/>
  <!-- Middelpunt -->
  <circle cx="80" cy="83" r="2.5" fill="#0C447C"/>

  <!-- Woordmerk -->
  <text x="108"
        y="68"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="52"
        font-weight="700"
        fill="#0C447C"
        letter-spacing="-1.5">Klantel</text>
</svg>

name: Auto-approve PR (Aethron-Bot)

# Centraal beheerd in AethronTech/.github (gesynct naar alle repo's).
# Trigger: enkel na afloop van de CI-workflow (workflow_run) i.p.v. elke
# check_suite — bespaart Actions-minuten (elke job factureert minimaal 1 min).

on:
  workflow_run:
    workflows: ["ci", "CI", "Quality Checks & CI"]
    types: [completed]

jobs:
  auto-approve:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate Aethron-Bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AETHRON_BOT_APP_ID }}
          private-key: ${{ secrets.AETHRON_BOT_PRIVATE_KEY }}

      - name: Find and approve open PRs for this commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;

            // Find open PRs matching this head SHA or branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });

            if (prs.length === 0) {
              console.log(`No open PRs found for branch ${branch}`);
              return;
            }

            for (const pr of prs) {
              // Verify all check runs for this PR's head SHA are successful
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });

              const relevant = checkRuns.check_runs.filter(
                r => r.name !== 'Auto-approve PR (Aethron-Bot)'
              );
              const allPassed = relevant.every(
                r => r.status === 'completed' && (r.conclusion === 'success' || r.conclusion === 'skipped' || r.conclusion === 'neutral')
              );

              if (!allPassed) {
                console.log(`PR #${pr.number}: not all checks passed yet — skipping`);
                continue;
              }

              // Skip if already approved by a bot
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              const alreadyApproved = reviews.some(
                r => r.state === 'APPROVED' && r.user.type === 'Bot'
              );
              if (alreadyApproved) {
                console.log(`PR #${pr.number}: already approved — skipping`);
                continue;
              }

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: '✅ All checks passed — auto-approved by Aethron-Bot.',
              });

              console.log(`✅ Approved PR #${pr.number}`);

              // Auto-merge
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                });
                console.log(`🔀 Merged PR #${pr.number}`);
              } catch (err) {
                console.log(`⚠️ Could not merge PR #${pr.number}: ${err.message}`);
              }
            }
